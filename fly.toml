# Fly.io — billing: new accounts get a short trial, then pay-as-you-go (often ~$5+/mo for a small always-on app).
# See https://fly.io/docs/about/free-trial/ and https://fly.io/pricing
#
# Deploy: install CLI https://fly.io/docs/hands-on/install-flyctl/
#   fly auth login
#   fly launch --no-deploy   # pick region, edit `app` name if taken, then:
#   fly secrets set ZOHO_SMTP_HOST=smtp.zoho.com ZOHO_SMTP_PORT=587 ...
#   fly deploy
#
# Replace `app` with a unique name (globally unique on fly.dev).

app = "bakesbyolayide-api"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

# Raise to 512mb in fly.toml if the machine OOM-restarts (billable RAM).
[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
